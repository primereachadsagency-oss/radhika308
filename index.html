<title>Radhika Telugu </title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#050816;
overflow:hidden;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;

}

/* Background */

body:before{

content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#00ff8850,transparent 70%);
left:-180px;
top:-180px;
filter:blur(60px);
animation:move1 8s infinite alternate;
}

body:after{

content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#00bfff40,transparent 70%);
right:-200px;
bottom:-200px;
filter:blur(70px);
animation:move2 9s infinite alternate;
}

@keyframes move1{

100%{
transform:translate(120px,80px);
}

}

@keyframes move2{

100%{
transform:translate(-120px,-80px);
}

}

.card{

width:360px;
padding:30px;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:24px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.4);

animation:float 5s ease infinite;

z-index:10;

}

@keyframes float{

50%{
transform:translateY(-10px);
}

}

.live{

display:inline-flex;
align-items:center;
gap:8px;

padding:8px 16px;

border-radius:40px;

background:rgba(0,255,136,.12);

border:1px solid rgba(0,255,136,.25);

font-size:12px;

margin-bottom:18px;

}

.live span{

width:8px;
height:8px;
background:#00ff88;
border-radius:50%;
animation:pulse 1s infinite;

}

@keyframes pulse{

50%{
opacity:.3;
transform:scale(.6);
}

}

.logo{

font-size:52px;
font-weight:700;
line-height:1;

background:linear-gradient(90deg,#00ff88,#00d4ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.sub{

letter-spacing:4px;
font-size:11px;
color:#8fffd4;
margin-top:6px;
margin-bottom:22px;

}

.chart{

margin:20px 0;

}

svg{

width:100%;
height:90px;

}

path{

stroke:#00ff88;
stroke-width:4;
fill:none;

stroke-dasharray:700;
stroke-dashoffset:700;

animation:draw 3s forwards;

filter:drop-shadow(0 0 10px #00ff88);

}

@keyframes draw{

to{
stroke-dashoffset:0;
}

}

.desc{

font-size:13px;
line-height:1.7;
color:#b8c4d0;
margin-bottom:20px;

}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;

}

.box{

background:#0c1731;
padding:12px;
border-radius:14px;
transition:.35s;

}

.box:hover{

transform:translateY(-5px);

background:#102145;

}

.num{

font-weight:700;
font-size:18px;
color:#00ff88;

}

.txt{

font-size:11px;
color:#8fa2b6;

}

.tags{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
margin-bottom:22px;

}

.tags span{

padding:7px 12px;
border-radius:20px;
background:#102145;
font-size:11px;

}

.btn{

display:block;

padding:16px;

border-radius:15px;

background:linear-gradient(90deg,#00ff88,#00d4ff);

color:#02130b;

text-decoration:none;

font-weight:700;

position:relative;

overflow:hidden;

}

.btn:before{

content:"";

position:absolute;

left:-100%;

top:0;

width:80px;

height:100%;

background:rgba(255,255,255,.5);

transform:skewX(-25deg);

animation:shine 3s infinite;

}

@keyframes shine{

100%{
left:150%;
}

}

.footer{

margin-top:18px;
font-size:11px;
color:#8fa2b6;

}

@media(max-width:420px){

.card{
width:92%;
}

.logo{
font-size:44px;
}

}

</style>

<script>

const card=document.querySelector(".card");

document.addEventListener("mousemove",e=>{

const x=(window.innerWidth/2-e.clientX)/35;

const y=(window.innerHeight/2-e.clientY)/35;

card.style.transform=
`rotateY(${x}deg) rotateX(${-y}deg)`;

});

document.addEventListener("mouseleave",()=>{

card.style.transform="rotateY(0deg) rotateX(0deg)";
